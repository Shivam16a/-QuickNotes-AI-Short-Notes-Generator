<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512">

    <defs>

        <linearGradient id="grad"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="100%">

            <stop offset="0%" stop-color="#4F46E5"/>
            <stop offset="100%" stop-color="#06B6D4"/>

        </linearGradient>

        <filter id="shadow"
                x="-30%"
                y="-30%"
                width="160%"
                height="160%">

            <feDropShadow
                dx="0"
                dy="8"
                stdDeviation="10"
                flood-opacity=".18"/>

        </filter>

    </defs>

    <!-- Document -->

    <g filter="url(#shadow)">

        <rect
            x="120"
            y="70"
            width="260"
            height="340"
            rx="28"
            fill="#ffffff"
            stroke="url(#grad)"
            stroke-width="10"/>

        <!-- Fold -->

        <path
            d="M310 70
               L380 140
               L310 140 Z"
            fill="url(#grad)"/>

    </g>

    <!-- Note Lines -->

    <g fill="url(#grad)">

        <rect x="160" y="150" width="150" height="10" rx="5"/>
        <rect x="160" y="185" width="120" height="10" rx="5"/>
        <rect x="160" y="220" width="165" height="10" rx="5"/>
        <rect x="160" y="255" width="140" height="10" rx="5"/>
        <rect x="160" y="290" width="90" height="10" rx="5"/>

    </g>

    <!-- Pen -->

    <g
        transform="rotate(-35 350 330)"
        filter="url(#shadow)">

        <rect
            x="330"
            y="200"
            width="24"
            height="150"
            rx="12"
            fill="url(#grad)"/>

        <polygon
            points="330,350 354,350 342,378"
            fill="#1E293B"/>

        <rect
            x="330"
            y="186"
            width="24"
            height="16"
            rx="8"
            fill="#1E293B"/>

    </g>

    <!-- AI Spark -->

    <g fill="#06B6D4">

        <path
            d="
            M420 85
            L427 104
            L446 111
            L427 118
            L420 137
            L413 118
            L394 111
            L413 104
            Z"/>

        <circle
            cx="385"
            cy="90"
            r="5"/>

        <circle
            cx="450"
            cy="150"
            r="4"/>

    </g>

</svg>